##### Prefix ############################################################

# Keep tmux's standard Ctrl-b prefix.
set -g prefix C-b
bind C-b send-prefix


##### Windows and panes #################################################

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# New windows and panes inherit the current pane's directory.
bind c new-window -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Vim-style pane navigation after pressing the prefix.
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Repeatable pane resizing.
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5


##### Terminal and Neovim integration ###################################

set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-kitty:RGB:clipboard"
set -s set-clipboard on
set -g focus-events on
set -s escape-time 10
set -g history-limit 50000


##### Mouse and copy mode ################################################

set -g mouse on
setw -g mode-keys vi

bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel


##### Usability ##########################################################

set -g display-time 4000

# Uppercase R preserves tmux's default prefix+r refresh binding.
bind R source-file ~/.tmux.conf \; display-message "tmux config reloaded"
